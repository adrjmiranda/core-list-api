services:
  db:
    image: postgres:15
    container_name: corelist_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: corelist_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d corelist_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: corelist_api
    ports:
      - "3333:3333"
    environment:
      DATABASE_URL: "postgresql://admin:password123@db:5432/corelist_db?schema=public"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
