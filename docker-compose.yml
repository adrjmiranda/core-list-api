services:
  db:
    image: postgres:15
    container_name: corelist_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: corelist_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin -d corelist_db']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
